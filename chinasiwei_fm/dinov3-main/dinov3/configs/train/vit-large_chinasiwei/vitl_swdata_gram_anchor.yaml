# step02 gram, based on step01: vitl_swdata_pretrain.yaml
MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32
compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP
dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1
  koleo_distributed_replicas: 0
  force_weight_norm: false
  # Gram Anchor Setup
  reweight_dino_local_loss: true
  local_loss_weight_schedule:
    start: 1
    peak: 1
    end: 0.5
    warmup_epochs: 100  #  TODO:改为Warmup 阶段持续的 Epoch 数
    cosine_epochs: 1
ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  mask_ratio_min_max:
  - 0.1
  - 0.5
  mask_random_circular_shift: false
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048
# Gram Anchor Setup
gram:
  use_loss: true
  compute_stats: false
  loss_weight: 1.0
  loss_weight_schedule: null
  ema_teacher: false
  ckpt: ../checkpoints/vitl16_pretrain_sat493m-eadcf0ff.pth
  it_load_ema_teacher: 0
  rep_update: true  # 启用表示更新
  update_frequency: 10000  # TODO: 减少更新次数,参考7B的更新频率
  it_first_update: 100000  # TODO:epochs*OFFICIAL_EPOCH_LENGTH*(2/3)，参考7B的2/3训练周期
  max_updates: 3  # 最多更新次数
  normalized: true
  img_level: true
  remove_neg: false
  remove_only_teacher_neg: false
  tokens_used: all  # 使用所有token
  global_teacher_resize_method: bicubic  # 全局教师图像插值方式
  global_teacher_resize_antialias: false
train:
  batch_size_per_gpu: 48
  dataset_path: ChinasiweiDataset:root=/:list_file=/mnt/data/test_image_list.txt
  output_dir: ./work_dirs/vitl_swdata_gram_anchor
  saveckp_freq: 20
  seed: 0
  num_workers: 10
  OFFICIAL_EPOCH_LENGTH: 1250
  monitor_gradient_norm: false
  chunk_schedule: []
  cache_dataset: true
  use_teacher_head: true
  learn_from_teacher_tokens: false
  centering: sinkhorn_knopp
  checkpointing: true  # 降低显存占用,训练速度变慢
  checkpointing_full: false  # 极致显存优化,训练速度更慢,Vit-L模型可不用
  compile: true
  cudagraphs: false
  cell_augmentation: false
  cell_augmentation_type: hpa
  channel_adaptive: false
  sharded_eval_checkpoint: true  # 分片评估checkpoint
student:
  arch: vit_large
  patch_size: 16
  drop_path_rate: 0.3
  layerscale: 1.0e-05
  patch_drop: 0.0
  pretrained_weights: ''
  ffn_layer: mlp
  ffn_ratio: 4.0
  resume_from_teacher_chkpt: '../checkpoints/vitl16_swdata_pretrain_step01.pth'  # 一阶段预训练权重
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  norm_layer: layernorm  # ViT-L保持layernorm
  untie_cls_and_patch_norms: false  # 解耦cls和patch norm
  untie_global_and_local_cls_norm: true  # 解耦全局/局部cls norm
  n_storage_tokens: 4
  mask_k_bias: true
  in_chans: 3
  pos_embed_type: rope
  pos_embed_rope_base: 100.0
  pos_embed_rope_min_period: null
  pos_embed_rope_max_period: null
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_shift_coords: null
  pos_embed_rope_jitter_coords: null
  pos_embed_rope_rescale_coords: null
  pos_embed_rope_dtype: bf16
  fp8_enabled: False 
  fp8_filter: "blocks"
  channel_adaptive: false
teacher:
  momentum_teacher: 0.992
  final_momentum_teacher: 1
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 30
  in_chans: 3
  channel_adaptive: false
distillation:
  enabled: false
  full_cfg_path: ''
  checkpoint_path: ''
multidistillation:
  enabled: false
hrft:
  enabled: false
  checkpoint_path: ''
optim:
  epochs: 120  # TODO: 参考一阶段的epochs
  optimizer: adamw
  weight_decay: 0.04
  weight_decay_end: 0.4
  lr: 3.0e-05  # 二阶段微调使用最小学习率
  warmup_epochs: 10  # TODO: epochs的1/10作为warmup阶段
  min_lr: 3.0e-05  # 学习率保持不变，使得继续预训练阶段模型保持稳定的更新速度
  clip_grad: 3.0  # 梯度裁剪阈值
  # 短暂冻结 Head 5 epochs，强制 Backbone 先适应新数据，确保特征空间的平稳迁移，适用于数据分布差异大的情况
  freeze_last_layer_epochs: 5  # 如果预训练数据集和自研数据集分布差异不大，可设置为0
  scaling_rule: sqrt_wrt_1024
  patch_embed_lr_mult: 0.2
  dino_head_wd_multiplier: 1.0
  layerwise_decay: 0.98  # 分层衰减
  multi_tensor_optim: true
  dump_fsdp_weights_path: ''
  adamw_beta1: 0.9
  adamw_beta2: 0.99
crops:
  global_crops_scale:
  - 0.32
  - 1.0
  local_crops_number: 8
  local_crops_scale:
  - 0.05
  - 0.32
  global_crops_size: 256
  local_crops_size: 112 
  gram_teacher_crops_size: 512
  localcrops_subset_of_globalcrops: false
  share_color_jitter: false
  horizontal_flips: false  # 保持空间位置绝对一致性
  gram_teacher_no_distortions: true  # Gram教师图像无畸变
  rgb_mean:
  - 0.430
  - 0.411
  - 0.296
  rgb_std:
  - 0.213
  - 0.156
  - 0.143
evaluation:
  eval_period_iterations: 12500
  low_freq_every: 5
  config_files:
    high_freq: benchmark_high_frequency.yaml
    low_freq: benchmark_low_frequency.yaml
checkpointing:
  period: 12500  #TODO： 每 12500 iter 保存一次（约每 10 个 Epoch）
  max_to_keep: 3
  keep_every: 25000  # TODO：额外强制保留检查点的间隔，单位是迭代次数
futher_ssl:
  enabled: true
  checkpoint_path: '../checkpoints/vitl16_pretrain_sat493m-eadcf0ff.pth'
schedules:  # 优先于optim的调度
  lr:
    start: 0
    peak: 3.0e-05
    end: 3.0e-05
    warmup_epochs: 10
    freeze_last_layer_epochs: 5
  weight_decay:
    start: 0.04
    peak: 0.04
    end: 0.04
    warmup_epochs: 0
  teacher_temp:
    start: 0.04
    peak: 0.07
    end: 0.07
    warmup_epochs: 20
  momentum:
    start: 0.999
    peak: 0.999
    end: 0.999
    warmup_epochs: 0